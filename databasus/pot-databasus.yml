name: pot-databasus
services:
  databasus:
    image: databasus/databasus:latest
    hostname: databasus
    container_name: pot-databasus
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.middlewares.cloudflare-realip.plugin.realip.Proxy[0].proxyHeadername="*"
      - traefik.http.middlewares.cloudflare-realip.plugin.realip.Proxy[0].realIP=CF-Connecting-IP
      - traefik.http.middlewares.cloudflare-realip.plugin.realip.Proxy[0].OverwriteXFF=true
      # TODO: for npmplus, how to set proxy host header as upstream host
      - traefik.http.routers.databasus.rule=${DATABASUS_HOST:-Host(`databasus.pot`)}
      - traefik.http.routers.databasus.entrypoints=web
      - traefik.http.routers.databasus.middlewares=cloudflare-realip@docker
      - traefik.http.services.databasus.loadbalancer.server.port=4005
      - traefik.http.services.databasus.loadbalancer.passhostheader=true
      - traefik.http.services.databasus.loadbalancer.healthcheck.path=/
    restart: unless-stopped
    networks:
      - potnet
    volumes:
      - ${DATABASUS_DATA_DIR:-/data/databasus}:/databasus-data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4005/api/v1/system/health"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: ${DATABASUS_MEM_LIMIT:-1024}mb

networks:
  potnet:
    name: potnet
    external: true
