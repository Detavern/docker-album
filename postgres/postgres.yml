name: postgres
services:
  postgres:
    image: postgres:18
    hostname: postgres
    container_name: postgres
    restart: unless-stopped
    # set shared memory limit, half of the total memory limit is a good practice
    shm_size: 256mb
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - ${POSTGRES_DATA_DIR:-/data/postgresql}:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}

    healthcheck:
      test:
        - CMD
        - pg_isready
        - -h
        - localhost
        - -p
        - "5432"
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: ${POSTGRES_MEM_LIMIT:-512}mb
