name: komari-agent
services:
  komari-agent:
    image: ${KOMARI_AGENT_IMAGE:-ghcr.io/komari-monitor/komari-agent:latest}
    hostname: komari-agent
    container_name: komari-agent
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    network_mode: host
    command: >-
      -e ${KOMARI_AGENT_ENDPOINT:?}
      --auto-discovery ${KOMARI_AGENT_AD_KEY:?}
      --disable-web-ssh
      --disable-auto-update
      --month-rotate ${KOMARI_AGENT_MONTH_ROTATE:-1}

    user: "1010:1010"
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: ${KOMARI_AGENT_MEM_LIMIT:-256}mb
