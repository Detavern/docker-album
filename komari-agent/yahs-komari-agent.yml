name: komari-agent
services:
  komari-agent:
    image: ${KOMARI_AGENT_IMAGE:-ghcr.io/komari-monitor/komari-agent:latest}
    hostname: komari-agent
    container_name: komari-agent
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    network_mode: host
    working_dir: /app/data
    environment:
      - HOST_PROC=/host/proc
      - AGENT_CUSTOM_IPV4=${KOMARI_AGENT_CUSTOM_IPV4:-}
      - AGENT_CUSTOM_IPV6=${KOMARI_AGENT_CUSTOM_IPV6:-}
      - AGENT_MONTH_ROTATE=${KOMARI_AGENT_MONTH_ROTATE:-1}
      - AGENT_INCLUDE_NICS=${KOMARI_AGENT_INCLUDE_NICS:?}
    volumes:
      - /proc:/host/proc:ro
      - /etc/os-release:/etc/os-release:ro
      - ${KOMARI_AGENT_DATA_DIR:-/data/komari-agent}:/app/data
      - ${KOMARI_AGENT_DATA_DIR:-/data/komari-agent}/auto-discovery.json:/app/auto-discovery.json
    command: >-
      -e ${KOMARI_AGENT_ENDPOINT:?}
      --auto-discovery ${KOMARI_AGENT_AD_KEY:?}
      --disable-web-ssh
      --disable-auto-update

    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: ${KOMARI_AGENT_MEM_LIMIT:-128}mb
